services:
  # The central 'Bus' for the gossip
  mosquitto:
    image: eclipse-mosquitto:latest
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -h localhost -t '$$SYS/broker/version' -C 1 -W 2 >/dev/null 2>&1 || exit 1"]
      interval: 1s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # Scalable agent service. Scale with:
  #   docker compose up -d --build --scale agent=<N>
  agent:
    build: ./agent
    command: ["python", "-u", "agent.py"]
    depends_on:
      mosquitto:
        condition: service_healthy
    volumes:
      - ./shared:/app/shared
    environment:
      - BROKER=mosquitto
      - DASHBOARD_URL=http://dashboard:5555/api/report
      - GOSSIP_INTERVAL_SECONDS=3
    restart: unless-stopped

  dashboard:
    build:
      context: .
      dockerfile: ./dashboard/Dockerfile
    depends_on:
      mosquitto:
        condition: service_healthy
    environment:
      - MQTT_BROKER_HOST=mosquitto
      - MQTT_BROKER_PORT=1883
      - EXPECTED_NODES=${EXPECTED_NODES:-0}
    ports:
      - "5555:5555"
    restart: unless-stopped
