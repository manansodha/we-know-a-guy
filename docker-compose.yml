services:
  # The central 'Bus' for the gossip
  mosquitto:
    image: eclipse-mosquitto:latest
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -h localhost -t '$$SYS/broker/version' -C 1 -W 2 >/dev/null 2>&1 || exit 1"]
      interval: 1s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # Agent 1
  agent_1:
    build: ./agent
    depends_on:
      mosquitto:
        condition: service_healthy
    volumes:
      - ./shared:/app/shared
    environment:
      - NODE_ID=1
      - ZONE=1

  # Agent 2
  agent_2:
    build: ./agent
    depends_on:
      mosquitto:
        condition: service_healthy
    volumes:
      - ./shared:/app/shared
    environment:
      - NODE_ID=2
      - ZONE=1
      - BROKER=mosquitto
      - GOSSIP_INTERVAL_SECONDS=3
    restart: unless-stopped

  # Agent 3
  agent_3:
    build: ./agent
    depends_on:
      mosquitto:
        condition: service_healthy
    volumes:
      - ./shared:/app/shared
    environment:
      - NODE_ID=3
      - ZONE=2
      - BROKER=mosquitto
      - GOSSIP_INTERVAL_SECONDS=3
    restart: unless-stopped

  # Agent 4
  agent_4:
    build: ./agent
    depends_on:
      mosquitto:
        condition: service_healthy
    volumes:
      - ./shared:/app/shared
    environment:
      - NODE_ID=4
      - ZONE=2
      - BROKER=mosquitto
      - GOSSIP_INTERVAL_SECONDS=3
    restart: unless-stopped

  # Agent 5
  agent_5:
    build: ./agent
    depends_on:
      mosquitto:
        condition: service_healthy
    volumes:
      - ./shared:/app/shared
    environment:
      - NODE_ID=5
      - ZONE=3
      - BROKER=mosquitto
      - GOSSIP_INTERVAL_SECONDS=3
    restart: unless-stopped

  # Agent 6
  agent_6:
    build: ./agent
    depends_on:
      mosquitto:
        condition: service_healthy
    volumes:
      - ./shared:/app/shared
    environment:
      - NODE_ID=6
      - ZONE=3
      - BROKER=mosquitto
      - GOSSIP_INTERVAL_SECONDS=3
    restart: unless-stopped

  dashboard:
    build:
      context: .
      dockerfile: ./dashboard/Dockerfile
    depends_on:
      mosquitto:
        condition: service_healthy
    environment:
      - MQTT_BROKER_HOST=mosquitto
      - MQTT_BROKER_PORT=1883
    ports:
      - "5555:5555"
    restart: unless-stopped
